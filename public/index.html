<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Weather App</title>
      <link rel="stylesheet" href="../styles/styles.css">
  </head>
  <body>
      <div class="weather-app">
            <img src="https://github.com/shecodesio/weather/blob/master/public/images/logo.png?raw=true" 
            alt=""
            width="250">
            <div class="search-bar">
                <input type="text" placeholder="Enter a city...">
                <button>Search</button>
            </div>
            
            <div class="city">San Francisco</div>
            <div>Wednesday 08:17, broken clouds</div>
            
            <div class="temperature">15°C</div>
            
            <div class="weather-condition">
                <img src="cloud-icon.png" alt="Cloud Icon">
                <div>broken clouds</div>
            </div>
            
            <div class="humidity">Humidity: 86%</div>
            <div class="wind">Wind: 6.26km/h</div>
            
            <div class="forecast">
                <div class="day">
                    <div>Tue</div>
                    <img src="cloud-icon.png" alt="Cloud Icon">
                    <div>16° 14°</div>
                </div>
                <div class="day">
                    <div>Wed</div>
                    <img src="sunny-icon.png" alt="Sunny Icon">
                    <div>19° 13°</div>
                </div>
                <div class="day">
                    <div>Thu</div>
                    <img src="sunny-icon.png" alt="Sunny Icon">
                    <div>18° 14°</div>
                </div>
                <div class="day">
                    <div>Fri</div>
                    <img src="partly-cloudy-icon.png" alt="Partly Cloudy Icon">
                    <div>18° 14°</div>
                </div>
                <div class="day">
                    <div>Sat</div>
                    <img src="partly-cloudy-icon.png" alt="Partly Cloudy Icon">
                    <div>18° 14°</div>
                </div>
            </div>

            <footer>
                This project was coded by Boitsholo Ramokhua 
            </footer>
        </div>
  </body>
</html>
